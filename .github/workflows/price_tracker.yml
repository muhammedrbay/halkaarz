name: Canlı Fiyat Takibi

on:
  schedule:
    # Her 8 dk'da bir, hafta içi, borsa saatleri (UTC 06:30–15:10 = TR 09:30–18:10)
    - cron: '*/8 6-15 * * 1-5'
  workflow_dispatch:

jobs:
  fiyat-takip:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodları Çek
        uses: actions/checkout@v4

      - name: 🐍 Python 3 Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: 📈 Fiyat Takibini Çalıştır
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SA_KEY_JSON: ${{ secrets.FIREBASE_SA_KEY_JSON }}
          FIREBASE_RTDB_URL: ${{ secrets.FIREBASE_RTDB_URL }}
        run: python backend/price_tracker.py
