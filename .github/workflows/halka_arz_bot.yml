name: Halka Arz Botu (CollectAPI + Firestore)

on:
  schedule:
    # Her gün saat 20:00 TR = 17:00 UTC
    - cron: '0 17 * * *'
  workflow_dispatch: # Manuel tetikleme

jobs:
  halka-arz-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Proje Kodlarını Çek
        uses: actions/checkout@v4

      - name: 🐍 Python 3 Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: 🚀 Halka Arz Botunu Çalıştır
        env:
          COLLECT_API_KEY: ${{ secrets.COLLECT_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SA_KEY_JSON: ${{ secrets.FIREBASE_SA_KEY_JSON }}
          FIREBASE_RTDB_URL: ${{ secrets.FIREBASE_RTDB_URL }}
        run: python backend/main.py
